app = "nanoclaw-bot"
primary_region = "sjc"

[build]
  dockerfile = "deploy/Dockerfile"

[[vm]]
  size = "shared-cpu-2x"
  memory = "4096mb"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[mounts]
  source = "nanoclaw_data"
  destination = "/data"

[env]
  NODE_ENV = "production"
  ASSISTANT_NAME = "Claw"
