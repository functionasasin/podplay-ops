# OpenClaw Gateway Configuration
# Docs: https://openclaw.ai/docs/gateway

gateway:
  name: monorepo-bot
  workspace: /home/user/monorepo

# LLM Provider
llm:
  provider: anthropic
  model: claude-sonnet-4-20250514
  # Set ANTHROPIC_API_KEY in environment

# Connected Channels
channels:
  telegram:
    enabled: true
    type: telegram-bot
    # Set TELEGRAM_BOT_TOKEN in environment
    # Create via @BotFather on Telegram
    allowed_users: [] # Add your Telegram user ID(s)

  whatsapp:
    enabled: false
    type: whatsapp-web
    # Requires QR code scan during `openclaw onboard`

  outlook:
    enabled: false
    type: email-imap
    # Set OUTLOOK_EMAIL and OUTLOOK_APP_PASSWORD in environment
    # Requires Microsoft app password (not regular password)
    imap_host: outlook.office365.com
    smtp_host: smtp.office365.com

# Scheduled Jobs
cron:
  podplay-daily-briefing:
    schedule: "0 8 * * *" # Every day at 8:00 AM
    channel: telegram
    skill: podplay-briefing
    description: Daily PodPlay status report

# Memory & Context
memory:
  persistent: true
  workspace_index: true
  index_paths:
    - entities/
    - research/
    - inbox/
