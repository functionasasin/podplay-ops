# Email Ingest Skill
# Runs twice daily (9am, 6pm) to pull new Outlook emails and extract entities.
name: email-ingest
description: Ingest Outlook emails into the monorepo — extract people, meetings, action items, decisions
version: 1.0.0
trigger: cron
channel: outlook

# Track which emails have already been processed so we don't re-ingest
state_file: .email-ingest-cursor.json

# The bot reads existing entities for context and writes new/updated ones
workspace_paths:
  read:
    - entities/
    - inbox/
    - CLAUDE.md
  write:
    - entities/
    - inbox/

actions:
  - fetch_emails    # Pull new emails from Outlook via IMAP
  - read_files      # Read existing entities for dedup/matching
  - write_files     # Create/update entity files
  - git_commit      # Commit changes
  - git_push        # Push to remote

prompt_file: prompt.md
