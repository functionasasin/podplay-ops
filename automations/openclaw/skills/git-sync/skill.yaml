# Git Sync Skill
# Keeps the local monorepo clone in sync with the remote.
# Runs on a cron schedule (every 15 min) and can be triggered manually.
name: git-sync
description: Pull latest monorepo changes and push any pending bot commits
version: 1.0.0
trigger: cron
channel: system # Internal skill, no user-facing channel

actions:
  - git_pull
  - git_push

prompt_file: prompt.md
