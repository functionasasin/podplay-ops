# Fly.io Configuration for OpenClaw Bot
# Deploy: fly deploy --config automations/openclaw/fly.toml
# Secrets: fly secrets set ANTHROPIC_API_KEY=... TELEGRAM_BOT_TOKEN=... GIT_REPO_URL=...

app = "monorepo-bot"
primary_region = "sjc" # San Jose — adjust to your nearest region

[build]
  dockerfile = "Dockerfile"

# Single always-on machine (not auto-scaled — this is a persistent bot)
[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

# No HTTP service needed — the bot communicates via Telegram API polling
# But expose a health check endpoint if OpenClaw provides one
[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false   # Keep running — bot must be always-on
  auto_start_machines = true
  min_machines_running = 1     # Never scale to zero

[checks]
  [checks.health]
    type = "http"
    port = 8080
    path = "/health"
    interval = "30s"
    timeout = "5s"

# Persistent volume for the monorepo clone
# This survives machine restarts so we don't re-clone every time
[mounts]
  source = "monorepo_data"
  destination = "/app/monorepo"

# Environment (non-secret values)
[env]
  OPENCLAW_WORKSPACE = "/app/monorepo"
  OPENCLAW_CONFIG = "/app/openclaw/gateway.yaml"
  NODE_ENV = "production"
