name: TaxKlaro Forward Loop

on:
  schedule:
    - cron: "0 6,18 * * *"   # 6am + 6pm UTC (2pm + 2am Manila)
  workflow_dispatch:
    inputs:
      max_iterations:
        description: "Max iterations (default 50)"
        required: false
        default: "50"

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.status.outputs.skip }}
    steps:
      - uses: actions/checkout@v4

      - name: Check loop status
        id: status
        run: |
          LOOP_DIR="apps/taxklaro/loops/forward"
          if [ -f "$LOOP_DIR/status/converged.txt" ]; then
            echo "Loop already converged. Skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          elif [ -f "$LOOP_DIR/status/paused.txt" ]; then
            echo "Loop is paused. Skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

  run-loop:
    needs: check
    if: needs.check.outputs.skip != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Configure git
        run: |
          git config user.name "ralph-loop[bot]"
          git config user.email "ralph-loop[bot]@users.noreply.github.com"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run until convergence (6-hour window)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd "apps/taxklaro/loops/forward"
          FAILURES=0
          ITERATION=0
          MAX_ITERATIONS=${{ github.event.inputs.max_iterations || '50' }}

          while true; do
            if [ -f status/converged.txt ]; then
              echo "Loop converged after $ITERATION iterations."
              break
            fi

            if [ $ITERATION -ge $MAX_ITERATIONS ]; then
              echo "Max iterations ($MAX_ITERATIONS) reached."
              break
            fi

            ITERATION=$((ITERATION + 1))
            echo "--- $(date '+%H:%M:%S') | Iteration $ITERATION ---"

            if bash -c '
              unset CLAUDECODE
              cat PROMPT.md | claude --print --dangerously-skip-permissions
            '; then
              FAILURES=0
            else
              EXIT_CODE=$?
              echo "WARNING: iteration $ITERATION exited with code $EXIT_CODE"
              FAILURES=$((FAILURES + 1))
              [ $FAILURES -ge 3 ] && echo "3 consecutive failures — stopping." && break
            fi

            # Push any local commits
            cd "$(git rev-parse --show-toplevel)"
            git add -A
            git diff --cached --quiet || git commit -m "loop(taxklaro-forward): iteration $ITERATION"
            if git log origin/${{ github.ref_name }}..HEAD --oneline | grep -q .; then
              git pull --rebase origin "${{ github.ref_name }}" || true
              git push || echo "WARNING: Push failed"
            fi
            cd "apps/taxklaro/loops/forward"

            sleep 5
          done

          echo "Done. Total iterations: $ITERATION"

      - name: Check convergence and notify
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          LOOP_DIR="apps/taxklaro/loops/forward"
          if [ -f "$LOOP_DIR/status/converged.txt" ]; then
            echo "TaxKlaro forward loop has converged!"

            ITER_COUNT=$(git log --oneline --grep="loop(taxklaro-forward)" | wc -l)

            gh issue create \
              --title "[ralph] taxklaro-forward converged ($ITER_COUNT iterations)" \
              --label "ralph-converged" \
              --body "$(cat <<ISSUEEOF
          ## Loop Converged

          **Loop:** taxklaro-forward
          **Iterations:** ~$ITER_COUNT
          **Output:** \`apps/taxklaro/\`

          The forward loop has built the full TaxKlaro platform. Review and deploy.

          ### Convergence Summary
          \`\`\`
          $(cat "$LOOP_DIR/status/converged.txt")
          \`\`\`
          ISSUEEOF
            )" || echo "WARNING: Could not create issue"

            # Update local registry
            cd "$(git rev-parse --show-toplevel)"
            if command -v yq &> /dev/null; then
              yq -i '.loops.forward.status = "converged" | .loops.forward.converged_at = "'"$(date -u +%Y-%m-%d)"'"' apps/taxklaro/loops/_registry.yaml
            fi
            git add apps/taxklaro/loops/_registry.yaml
            git commit -m "loop(taxklaro-forward): mark converged in registry" || true
            git push || true
          fi
