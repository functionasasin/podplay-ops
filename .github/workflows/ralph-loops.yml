name: Ralph Loops

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      loop:
        description: "Run a specific loop name, or 'all' for all active loops"
        required: false
        default: "all"

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.parse.outputs.matrix }}
      has_loops: ${{ steps.parse.outputs.has_loops }}
    steps:
      - uses: actions/checkout@v4

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Parse registry for active loops
        id: parse
        run: |
          FILTER="${{ github.event.inputs.loop || 'all' }}"

          if [ "$FILTER" = "all" ]; then
            # Get all reverse loops with status 'active' (forward loops run elsewhere)
            LOOPS=$(yq -o=json '.loops | to_entries | map(select(.value.status == "active" and .value.type == "reverse")) | map(.key)' loops/_registry.yaml)
          else
            # Run a specific loop (regardless of status, for manual override)
            LOOPS=$(echo "[\"$FILTER\"]" | yq -o=json)
          fi

          COUNT=$(echo "$LOOPS" | yq 'length')
          if [ "$COUNT" -eq 0 ]; then
            echo "No active loops found."
            echo "has_loops=false" >> "$GITHUB_OUTPUT"
            echo "matrix={\"loop\":[]}" >> "$GITHUB_OUTPUT"
          else
            echo "Active loops: $LOOPS"
            echo "has_loops=true" >> "$GITHUB_OUTPUT"
            echo "matrix={\"loop\":$(echo $LOOPS)}" >> "$GITHUB_OUTPUT"
          fi

  run-loop:
    needs: discover
    if: needs.discover.outputs.has_loops == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
      fail-fast: false
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          submodules: recursive

      - name: Configure git
        run: |
          git config user.name "ralph-loop[bot]"
          git config user.email "ralph-loop[bot]@users.noreply.github.com"

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Check loop status
        id: check
        run: |
          LOOP_DIR="loops/${{ matrix.loop }}"
          if [ -f "$LOOP_DIR/status/converged.txt" ]; then
            echo "Loop ${{ matrix.loop }} already converged. Skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          elif [ -f "$LOOP_DIR/status/paused.txt" ]; then
            echo "Loop ${{ matrix.loop }} is paused. Skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install psql (for DB-querying loops)
        if: steps.check.outputs.skip != 'true'
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Run iterations (up to 20 minutes)
        if: steps.check.outputs.skip != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CHEERFUL_DATABASE_URL: ${{ secrets.CHEERFUL_DATABASE_URL }}
        run: |
          cd "loops/${{ matrix.loop }}"
          DEADLINE=$(($(date +%s) + 1200))   # 20-minute budget
          FAILURES=0

          while [ $(date +%s) -lt $DEADLINE ]; do
            # Stop if already converged
            if [ -f status/converged.txt ]; then
              echo "Loop converged, stopping."
              break
            fi

            # Stop if less than 90s left (not enough runway for another aspect)
            REMAINING=$((DEADLINE - $(date +%s)))
            if [ $REMAINING -lt 90 ]; then
              echo "Less than 90s remaining — stopping cleanly. Remaining: ${REMAINING}s"
              break
            fi

            echo "--- $(date '+%H:%M:%S') | Remaining: ${REMAINING}s ---"

            # Run one aspect (cap each at 10 min so we always get at least 2 per run)
            if timeout 600 bash -c '
              unset CLAUDECODE
              cat PROMPT.md | claude --print --dangerously-skip-permissions
            '; then
              FAILURES=0
            else
              EXIT_CODE=$?
              [ "$EXIT_CODE" -eq 124 ] && echo "WARNING: aspect timed out" || echo "WARNING: aspect exited $EXIT_CODE"
              FAILURES=$((FAILURES + 1))
              [ $FAILURES -ge 3 ] && echo "3 consecutive failures — stopping." && break
            fi

            # Commit after each aspect
            git add -A
            git diff --cached --quiet || {
              git commit -m "loop(${{ matrix.loop }}): iteration"
              git pull --rebase origin "${{ github.ref_name }}" || true
              git push || echo "WARNING: Push failed, will retry next run"
            }

            sleep 5
          done

          echo "Time budget exhausted or loop finished."

      - name: Check convergence and notify
        if: steps.check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          LOOP_DIR="loops/${{ matrix.loop }}"
          if [ -f "$LOOP_DIR/status/converged.txt" ]; then
            echo "Loop ${{ matrix.loop }} has converged!"

            # Count iterations from git log
            ITER_COUNT=$(git log --oneline --grep="loop(${{ matrix.loop }})" | wc -l)

            # Create GitHub issue
            gh issue create \
              --title "[ralph] ${{ matrix.loop }} converged ($ITER_COUNT iterations)" \
              --label "ralph-converged" \
              --body "$(cat <<ISSUEEOF
          ## Loop Converged

          **Loop:** ${{ matrix.loop }}
          **Iterations:** ~$ITER_COUNT
          **Output:** \`$LOOP_DIR/analysis/\`

          The frontier is exhausted. Review the results and decide next steps.

          ### Convergence Summary
          \`\`\`
          $(cat "$LOOP_DIR/status/converged.txt")
          \`\`\`
          ISSUEEOF
            )" || echo "WARNING: Could not create issue (label may not exist yet)"

            # Update registry
            yq -i ".loops[\"${{ matrix.loop }}\"].status = \"converged\" | .loops[\"${{ matrix.loop }}\"].converged_at = \"$(date -u +%Y-%m-%d)\"" loops/_registry.yaml
            git add loops/_registry.yaml
            git commit -m "loop(${{ matrix.loop }}): mark converged in registry"
            git push || true
          fi
